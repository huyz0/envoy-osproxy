[toolchain]
# Pinned exact so clippy's lint set is identical locally and in CI (a floating
# "stable" drifts and breaks the gate). Also the toolchain the reused engine
# crates are known to compile under. Bumping is deliberate.
channel = "1.94.1"
components = ["rustfmt", "clippy", "llvm-tools-preview"]
profile = "default"
