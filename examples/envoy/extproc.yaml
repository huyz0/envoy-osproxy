# Example Envoy bootstrap — EXT_PROC backend.
#
# Envoy calls an out-of-process gRPC service (your ext_proc binary) per request;
# the service runs the same brain and returns header/body mutations. This example
# uses the built-in reference tenancy in shared-index mode (configured entirely by
# the service's construction — the ext_proc service ships the reference tenancy;
# see examples/README.md and the "current limitations" there re: a custom SPI on
# this backend).
static_resources:
  listeners:
    - name: ingress
      address: { socket_address: { address: 0.0.0.0, port_value: 10000 } }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress
                route_config:
                  virtual_hosts:
                    - name: all
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: opensearch }
                http_filters:
                  - name: envoy.filters.http.ext_proc
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                      grpc_service: { envoy_grpc: { cluster_name: evoxy_extproc } }
                      mutation_rules: { allow_all_routing: true, allow_envoy: true }
                      processing_mode:
                        request_header_mode: SEND
                        request_body_mode: BUFFERED
                        response_header_mode: SEND
                        response_body_mode: BUFFERED
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
  clusters:
    # Your ext_proc server (HTTP/2 gRPC).
    - name: evoxy_extproc
      type: STRICT_DNS
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config: { http2_protocol_options: {} }
      load_assignment:
        cluster_name: evoxy_extproc
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: evoxy-extproc.internal, port_value: 50051 } } }
    # The logical "cluster" the tenancy names, mapped to a real OpenSearch upstream.
    - name: opensearch
      type: STRICT_DNS
      load_assignment:
        cluster_name: opensearch
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: opensearch.internal, port_value: 9200 } } }
