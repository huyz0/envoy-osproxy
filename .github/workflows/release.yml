name: Release

# CD for the one shippable artifact: the evoxy dynamic module baked into a stock,
# unmodified Envoy (ADR-004). On a version tag we build that image and publish it
# to GitHub Container Registry, so an operator can `docker pull` a ready image
# instead of building the `.so` themselves. Envoy itself is never forked — the
# image only drops our `.so` into the upstream binary's search path.
on:
  push:
    tags: ["v*"]
  # Allow a manual publish from the Actions tab (uses the branch's HEAD).
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  # ghcr.io/<owner>/evoxy-envoy — the owner is lower-cased by metadata-action.
  IMAGE: ghcr.io/${{ github.repository_owner }}/evoxy-envoy

jobs:
  image:
    name: publish evoxy-envoy image (module in stock Envoy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # A semver tag → :1.2.3 and :1.2; a push to main → :latest.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/evoxy-module/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
