name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  gate:
    name: gate (fmt · clippy · arch · crypto-free · test · doc · budgets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Reads the pinned channel + components (clippy, rustfmt) from rust-toolchain.toml.
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: cargo xtask ci
        run: cargo xtask ci

  module-build:
    name: dynamic module cdylib + custom-module example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      # bindgen (via the Envoy SDK) needs libclang.
      - name: install clang
        run: sudo apt-get update && sudo apt-get install -y clang
      # The workspace-excluded cdylibs are not built by the gate; prove both the
      # reference `.so` and a custom-tenancy module (the user path) still compile
      # against the pinned upstream SDK.
      - name: build the reference module
        run: cargo build --release
        working-directory: crates/evoxy-module
      - name: build the custom-module example
        run: cargo build --release
        working-directory: examples/custom-module

  integration:
    name: live tests through real Envoy + OpenSearch (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      # Build the stock-Envoy-plus-module image, then run the Docker-gated
      # correctness harnesses (both backends) end-to-end.
      - name: build the module image
        run: cargo xtask module-image
      - name: ext_proc e2e
        run: cargo test -p evoxy-extproc --test e2e -- --ignored --test-threads=1
      - name: dynamic-module e2e
        run: cargo test -p evoxy-extproc --test e2e_module -- --ignored --test-threads=1
